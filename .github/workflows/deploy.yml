name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_ADSENSE_PUBLISHER_ID: ca-pub-8344215225561043
          NEXT_PUBLIC_ADSENSE_SLOT_TOP: "5754924099"
          NEXT_PUBLIC_ADSENSE_SLOT_BOTTOM: "1259445654"
          NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${{ secrets.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
          NEXT_PUBLIC_GISCUS_REPO: smc5720/smc5720.github.io
          NEXT_PUBLIC_GISCUS_REPO_ID: R_kgDOGkqz4Q
          NEXT_PUBLIC_GISCUS_CATEGORY: Announcements
          NEXT_PUBLIC_GISCUS_CATEGORY_ID: DIC_kwDOGkqz4c4C9Wgf

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
