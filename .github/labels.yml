# RicoCheese's Blog — 라벨 정의
# 동기화: scripts/sync-labels.sh (gh CLI 필요)
#
# 색상 가이드
#   type:*     주요 카테고리 색
#   area:*     중립 슬레이트 톤 (#8a8a9a 계열)
#   priority:* 빨강→초록 그라데이션
#   status:*   파스텔, 워크플로 단계 식별용
#
# 시그니처 라임(#C8FF00)은 type:design에만 사용.

# ── type ───────────────────────────────────────────────────────
- name: "type:bug"
  color: "d73a4a"
  description: "버그 — 의도와 다르게 동작"
- name: "type:feature"
  color: "a2eeef"
  description: "새 기능 / 페이지 / 사용자 가치 추가"
- name: "type:design"
  color: "c8ff00"
  description: "v2 디자인 시스템·UI·UX 구현"
- name: "type:content"
  color: "a78bfa"
  description: "블로그 글 (content/posts)"
- name: "type:chore"
  color: "cfd3d7"
  description: "리팩토링 · 의존성 · 청소"
- name: "type:docs"
  color: "0075ca"
  description: "문서 (README, AGENTS, 백로그 등)"

# ── area ───────────────────────────────────────────────────────
- name: "area:home"
  color: "646b7a"
  description: "/ (홈)"
- name: "area:blog-list"
  color: "646b7a"
  description: "/blog 목록"
- name: "area:blog-detail"
  color: "646b7a"
  description: "/blog/[slug] 상세"
- name: "area:about"
  color: "646b7a"
  description: "/about"
- name: "area:system"
  color: "646b7a"
  description: "/system — 디자인 시스템 페이지"
- name: "area:404"
  color: "646b7a"
  description: "404 / 에러 페이지"
- name: "area:design-system"
  color: "4a5060"
  description: "토큰 · 폰트 · 글로벌 스타일"
- name: "area:mdx"
  color: "4a5060"
  description: "MDX 렌더링 · 코드블록 · prose"
- name: "area:infra"
  color: "4a5060"
  description: "빌드 · 배포 · 패키지"
- name: "area:ci"
  color: "4a5060"
  description: "GitHub Actions · 워크플로"
- name: "area:content"
  color: "4a5060"
  description: "글 콘텐츠 자체"

# ── priority ───────────────────────────────────────────────────
- name: "priority:p0"
  color: "b60205"
  description: "P0 — 지금 바로"
- name: "priority:p1"
  color: "d93f0b"
  description: "P1 — 다음 작업"
- name: "priority:p2"
  color: "fbca04"
  description: "P2 — 곧"
- name: "priority:p3"
  color: "0e8a16"
  description: "P3 — 언젠가"

# ── status ─────────────────────────────────────────────────────
- name: "status:needs-spec"
  color: "bfd4f2"
  description: "스펙·결정 필요"
- name: "status:ready"
  color: "0e8a16"
  description: "착수 가능"
- name: "status:in-progress"
  color: "fbca04"
  description: "작업 중"
- name: "status:blocked"
  color: "e99695"
  description: "막힘 — 외부 입력 대기"
- name: "status:review"
  color: "5319e7"
  description: "리뷰 중"
- name: "status:done"
  color: "cfd3d7"
  description: "완료 (보통은 close — 추적용)"
