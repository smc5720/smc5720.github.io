  <!-- border -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="1.5" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <!-- center R -->
  <text x="16" y="22" text-anchor="middle" fill="#C8FF00" font-family="&quot;JetBrains Mono&quot;,&quot;Courier New&quot;,monospace" font-weight="600" font-size="18">R</text>
